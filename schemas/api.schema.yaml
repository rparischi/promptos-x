schema:
  name: api
  version: "1.0"

required:

  - endpoint
  - method

properties:

  endpoint:
    type: string

  method:
    type: string

  description:
    type: string

  authentication:
    type: string

  authorization:
    type: string

  input:
    type: object

  output:
    type: object

  dependencies:
    type: array